<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="brandGradLight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer hexagon shield -->
  <path d="M24 2L46 14V38L24 50L2 38V14L24 2Z" stroke="url(#brandGrad)" stroke-width="2" fill="url(#brandGrad)" fill-opacity="0.08"/>
  <path d="M24 6L42 18V36L24 46L6 36V18L24 6Z" stroke="url(#brandGrad)" stroke-width="1" fill="url(#brandGrad)" fill-opacity="0.06"/>

  <!-- Graph nodes -->
  <circle cx="17" cy="20" r="3.5" fill="url(#brandGradLight)" filter="url(#glow)"/>
  <circle cx="31" cy="20" r="3.5" fill="url(#brandGradLight)" filter="url(#glow)"/>
  <circle cx="24" cy="33" r="3.5" fill="url(#brandGradLight)" fill-opacity="0.5"/>

  <!-- Node connections (edges) -->
  <line x1="20" y1="22" x2="22.5" y2="31" stroke="url(#brandGradLight)" stroke-width="1.5" stroke-opacity="0.4" stroke-linecap="round"/>
  <line x1="28" y1="22" x2="25.5" y2="31" stroke="url(#brandGradLight)" stroke-width="1.5" stroke-opacity="0.4" stroke-linecap="round"/>

  <!-- Subtle decorative dots -->
  <circle cx="24" cy="4" r="1.5" fill="url(#brandGrad)" opacity="0.3"/>
  <circle cx="24" cy="45" r="1.5" fill="url(#brandGrad)" opacity="0.3"/>
</svg>
